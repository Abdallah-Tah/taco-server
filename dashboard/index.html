<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TacoClaw Live — Galaxy Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-deep: #060b18;
    --bg-panel: #0a1128;
    --bg-card: #0d1a33;
    --border-glow: rgba(0, 180, 255, 0.15);
    --accent-cyan: #00d4ff;
    --accent-purple: #a855f7;
    --accent-pink: #ff3b8b;
    --accent-gold: #fbbf24;
    --accent-green: #34d399;
    --accent-red: #ef4444;
    --text-primary: #e2e8f0;
    --text-dim: #64748b;
    --text-bright: #f8fafc;
    --laser-green: #00ff88;
    --laser-core: #ffffff;
    --header-height: 70px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .galaxy-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .galaxy-container.screen-shake {
    animation: screenShake 0.4s ease-out;
  }

  @keyframes screenShake {
    0% { transform: translate(0, 0); }
    15% { transform: translate(-4px, 3px); }
    30% { transform: translate(5px, -2px); }
    45% { transform: translate(-3px, -4px); }
    60% { transform: translate(4px, 2px); }
    75% { transform: translate(-2px, 3px); }
    100% { transform: translate(0, 0); }
  }

  canvas#starfield,
  canvas#laserCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  canvas#starfield { z-index: 0; }
  canvas#laserCanvas {
    z-index: 6;
    pointer-events: none;
  }

  .nebula-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .nebula-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: nebulaPulse 12s ease-in-out infinite;
  }

  .nebula-blob.blue {
    width: 500px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0, 120, 255, 0.08), transparent 70%);
    top: 10%;
    left: 15%;
  }

  .nebula-blob.purple {
    width: 600px;
    height: 350px;
    background: radial-gradient(ellipse, rgba(130, 0, 255, 0.06), transparent 70%);
    top: 50%;
    right: 10%;
    animation-delay: -4s;
  }

  .nebula-blob.pink {
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(255, 59, 139, 0.04), transparent 70%);
    bottom: 15%;
    left: 40%;
    animation-delay: -8s;
  }

  @keyframes nebulaPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    33% { opacity: 1; transform: scale(1.1); }
    66% { opacity: 0.4; transform: scale(0.95); }
  }

  .win-flash {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at 12% 55%, rgba(0, 255, 136, 0.4), transparent 60%);
  }

  .win-flash.active {
    animation: flashBurst 0.6s ease-out forwards;
  }

  @keyframes flashBurst {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .win-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 25;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--laser-green);
    text-shadow:
      0 0 20px rgba(0, 255, 136, 0.8),
      0 0 60px rgba(0, 255, 136, 0.4),
      0 0 120px rgba(0, 255, 136, 0.2);
    white-space: nowrap;
    opacity: 0;
  }

  @media (max-width: 768px) {
    .win-banner { font-size: 24px; letter-spacing: 3px; }
    .win-banner .pnl { font-size: 18px !important; }
  }

  .win-banner.active {
    animation: bannerPop 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes bannerPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    15% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
  }

  .win-banner .pnl {
    font-size: 28px;
    display: block;
    margin-top: 6px;
    letter-spacing: 2px;
  }

  .header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(6, 11, 24, 0.95), transparent);
  }

  @media (max-width: 768px) {
    .header { padding: 10px 15px; }
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-ring {
    width: 44px;
    height: 44px;
    border: 2px solid var(--accent-cyan);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: logoSpin 20s linear infinite;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
  }

  .logo-ring svg {
    width: 24px;
    height: 24px;
    fill: var(--accent-cyan);
    filter: drop-shadow(0 0 5px var(--accent-cyan));
  }

  @keyframes logoSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .brand h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .brand h1 { font-size: 14px; letter-spacing: 1px; }
    .brand .subtitle { font-size: 7px; letter-spacing: 2px; }
    .logo-ring { width: 32px; height: 32px; }
  }

  .header-nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  @media (max-width: 768px) {
    .header-nav .nav-btn, .header-nav .shell-btn { display: none; }
    .header-nav .nav-btn.active { display: block; }
  }

  .nav-btn,
  .shell-btn {
    text-decoration: none;
  }

  .nav-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .nav-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }

  .nav-btn.active {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    background: rgba(0, 212, 255, 0.06);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
  }

  .temp-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-gold);
    padding: 6px 12px;
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-radius: 6px;
    background: rgba(251, 191, 36, 0.05);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .temp-badge svg {
    width: 12px;
    height: 12px;
    fill: var(--accent-gold);
  }

  .shell-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 18px;
    background: linear-gradient(135deg, var(--accent-cyan), #0088cc);
    border: none;
    color: #000;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  }

  /* Main Layout Panels */
  .engine-panel {
    position: absolute;
    top: 80px;
    left: 20px;
    right: 380px;
    bottom: 260px;
    z-index: 5;
    border: 1px solid var(--border-glow);
    border-radius: 12px;
    overflow: hidden;
    background: rgba(10, 17, 40, 0.3);
    backdrop-filter: blur(4px);
  }

  @media (max-width: 1024px) {
    .engine-panel { right: 20px; bottom: 45%; }
  }

  @media (max-width: 768px) {
    .engine-panel { top: 70px; left: 10px; right: 10px; bottom: 55%; }
  }

  .engine-panel-header {
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .engine-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent-cyan);
  }

  .engine-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-green);
    letter-spacing: 1px;
  }

  .taco-sprite {
    position: absolute;
    z-index: 100;
    transition: left 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                top 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                transform 0.3s ease-out;
    filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3));
    cursor: pointer;
    user-select: none;
    left: 6%;
    top: 50%;
  }

  .taco-sprite svg {
    width: 52px;
    height: 52px;
    filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.5));
  }

  .taco-sprite.striking {
    transition: left 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67), 
                top 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    z-index: 150;
  }

  @media (max-width: 768px) {
    .taco-sprite svg { width: 40px; height: 40px; }
  }

  .taco-sprite.charging {
    animation: tacoCharge 0.3s ease-in-out;
  }

  .taco-sprite.firing {
    animation: tacoRecoil 0.15s ease-out;
  }

  @keyframes tacoCharge {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1.1); }
  }

  @keyframes tacoRecoil {
    0% { transform: scale(1.1) translateX(0); }
    50% { transform: scale(0.9) translateX(-8px); }
    100% { transform: scale(1) translateX(0); }
  }

  .log-entries {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    padding: 10px;
  }

  .log-entry {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    white-space: nowrap;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.4);
    border-left: 2px solid;
    animation: logFloat var(--dur, 18s) linear forwards;
    opacity: 0;
    backdrop-filter: blur(2px);
  }

  .log-entry.order_placed { border-color: var(--accent-cyan); color: rgba(0, 212, 255, 0.8); }
  .log-entry.order_cancelled_fok { border-color: var(--accent-purple); color: rgba(168, 85, 247, 0.75); }
  .log-entry.skip { border-color: var(--accent-gold); color: rgba(251, 191, 36, 0.8); }
  .log-entry.loss { border-color: var(--accent-red); color: rgba(239, 68, 68, 0.8); }
  .log-entry.fill_verified,
  .log-entry.redeem,
  .log-entry.win {
    border-color: var(--laser-green);
    color: rgba(52, 211, 153, 0.95);
    font-weight: 600;
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
  }

  @keyframes logFloat {
    0% { opacity: 0; transform: translateX(105%); }
    5% { opacity: 0.8; }
    85% { opacity: 0.6; }
    100% { opacity: 0; transform: translateX(-105%) translateY(-30px); }
  }

  .planet {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    transition: transform 2s ease-in-out, left 2s ease-in-out, top 2s ease-in-out;
  }

  .planet-body {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: inset -6px -6px 15px rgba(0,0,0,0.4);
    position: relative;
  }

  .planet.btc .planet-body { background: radial-gradient(circle at 35% 35%, #fbbf24, #d97706, #92400e); box-shadow: 0 0 40px rgba(251, 191, 36, 0.2); }
  .planet.eth .planet-body { background: radial-gradient(circle at 35% 35%, #60a5fa, #2563eb, #1e3a8a); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
  .planet.sol .planet-body { background: radial-gradient(circle at 35% 35%, #a855f7, #7c3aed, #4c1d95); box-shadow: 0 0 40px rgba(124, 58, 237, 0.2); }
  .planet.xrp .planet-body { background: radial-gradient(circle at 35% 35%, #94a3b8, #475569, #1e293b); box-shadow: 0 0 40px rgba(148, 163, 184, 0.2); }

  .planet-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 55%;
    height: 55%;
    opacity: 1;
    pointer-events: none;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
    z-index: 10;
    object-fit: contain;
  }

  .planet-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140%;
    height: 140%;
    transform: translate(-50%, -50%) rotateX(75deg);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    pointer-events: none;
  }

  .planet-label {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  @keyframes planetBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .stats-bar {
    position: absolute;
    bottom: 130px;
    left: 20px;
    right: 380px;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 1024px) {
    .stats-bar { right: 20px; bottom: 33%; }
  }

  @media (max-width: 768px) {
    .stats-bar {
      grid-template-columns: repeat(2, 1fr);
      left: 10px;
      right: 10px;
      bottom: 40%;
      gap: 8px;
    }
  }

  .stat-card {
    background: rgba(13, 26, 51, 0.8);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    position: relative;
  }

  @media (max-width: 768px) {
    .stat-card { padding: 10px 12px; }
  }

  .stat-card:hover {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.1);
    transform: translateY(-2px);
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
  }

  .stat-value.money { font-size: 28px; color: var(--text-bright); }
  .stat-value.percent { font-size: 28px; color: var(--accent-green); }
  .stat-value.streak { font-size: 28px; color: var(--accent-gold); }
  .stat-value.uptime { font-size: 22px; color: var(--accent-cyan); }

  @media (max-width: 768px) {
    .stat-value.money, .stat-value.percent, .stat-value.streak { font-size: 20px; }
    .stat-value.uptime { font-size: 16px; }
  }

  .kill-counter {
    position: absolute;
    bottom: 4px;
    right: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--laser-green);
    opacity: 0.6;
    letter-spacing: 1px;
  }

  .positions-panel {
    position: absolute;
    bottom: 10px;
    left: 20px;
    right: 380px;
    z-index: 10;
    background: rgba(13, 26, 51, 0.7);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  @media (max-width: 1024px) {
    .positions-panel { right: 20px; bottom: 10px; height: 30%; }
  }

  @media (max-width: 768px) {
    .positions-panel { left: 10px; right: 10px; bottom: 10px; height: 38%; }
  }

  .positions-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  @media (max-width: 768px) {
    .positions-header { padding: 8px 12px; }
  }

  .positions-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  .locked-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 20px;
    color: var(--accent-cyan);
  }

  #positionsList {
    height: calc(100% - 40px);
    overflow-y: auto;
  }

  .position-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    transition: background 0.2s;
    gap: 12px;
  }

  @media (max-width: 768px) {
    .position-row { padding: 8px 12px; font-size: 10px; }
  }

  .position-row:hover { background: rgba(255,255,255,0.02); }

  .position-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .position-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin: 0 16px;
  }

  .position-pnl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }

  .position-pnl.loss { color: var(--accent-red); }
  .position-pnl.gain { color: var(--accent-green); }

  .event-feed {
    position: absolute;
    top: 80px;
    right: 10px;
    width: 355px;
    bottom: 10px;
    z-index: 10;
    background: rgba(13, 26, 51, 0.7);
    border: 1px solid var(--border-glow);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  @media (max-width: 1024px) {
    .event-feed {
      transform: translateX(110%);
    }
    .event-feed.mobile-open {
      transform: translateX(0);
      right: 10px;
      left: 10px;
      width: auto;
      top: 70px;
      bottom: 10px;
      z-index: 200;
    }
  }

  .feed-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .feed-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent-purple);
  }

  .feed-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .feed-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .feed-item {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: rgba(0, 0, 0, 0.2);
    border-left: 3px solid;
    animation: feedSlide 0.4s ease-out;
  }

  .feed-item.order_placed { border-color: var(--accent-cyan); }
  .feed-item.order_cancelled_fok { border-color: var(--accent-purple); }
  .feed-item.skip { border-color: var(--accent-gold); }
  .feed-item.loss { border-color: var(--accent-red); }
  .feed-item.fill_verified,
  .feed-item.redeem,
  .feed-item.win {
    border-color: var(--laser-green);
    background: rgba(0, 255, 136, 0.05);

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
const laserCanvas = document.getElementById('laserCanvas');
const lCtx = laserCanvas.getContext('2d');
const tacoSprite = document.getElementById('tacoSprite');
const winFlash = document.getElementById('winFlash');
const winBanner = document.getElementById('winBanner');
const winPnl = document.getElementById('winPnl');
const galaxyContainer = document.getElementById('galaxyContainer');
const killCounterEl = document.getElementById('killCounter');
const logContainer = document.getElementById('logEntries');
const feedScroll = document.getElementById('feedScroll');
const positionsList = document.getElementById('positionsList');
const eventFeed = document.getElementById('eventFeed');
const mobileToggle = document.getElementById('mobileToggle');
const closeFeed = document.getElementById('closeFeed');
const seenEvents = new Set();

let W;
let H;
let laserKills = 0;
let activeLasers = [];
let particles = [];
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  laserCanvas.width = W;
  laserCanvas.height = H;
  
  if (W <= 1024) {
    closeFeed.style.display = 'block';
  } else {
    closeFeed.style.display = 'none';
    eventFeed.classList.remove('mobile-open');
  }
}
resize();
window.addEventListener('resize', resize);

// Mobile Toggle Support
mobileToggle.addEventListener('click', () => {
  eventFeed.classList.add('mobile-open');
});
closeFeed.addEventListener('click', () => {
  eventFeed.classList.remove('mobile-open');
});

class Star {
  constructor(layer) {
    this.layer = layer;
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const sizes = [0.4, 0.8, 1.4];
    const speeds = [0.08, 0.2, 0.4];
    const alphas = [0.3, 0.5, 0.8];
    this.size = sizes[this.layer] + Math.random() * 0.4;
    this.speed = speeds[this.layer] + Math.random() * 0.05;
    this.baseAlpha = alphas[this.layer];
    this.alpha = this.baseAlpha;
    this.twinkleSpeed = 0.005 + Math.random() * 0.02;
    this.twinkleOffset = Math.random() * Math.PI * 2;
    const colors = [[200,220,255],[255,240,220],[220,200,255],[200,255,240],[255,255,255]];
    this.color = colors[Math.floor(Math.random() * colors.length)];
  }
  update(t) {
    this.x -= this.speed;
    if (this.x < -5) {
      this.x = W + 5;
      this.y = Math.random() * H;
    }
    this.alpha = this.baseAlpha + Math.sin(t * this.twinkleSpeed + this.twinkleOffset) * 0.2;
  }
  draw() {
    const [r, g, b] = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
    ctx.fill();
    if (this.layer === 2 && this.alpha > 0.7) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha * 0.1})`;
      ctx.fill();
    }
  }
}

class ShootingStar {
  constructor() { this.active = false; }
  fire() {
    this.active = true;
    this.x = W * 0.3 + Math.random() * W * 0.5;
    this.y = Math.random() * H * 0.4;
    this.angle = Math.PI * 0.75 + Math.random() * 0.3;
    this.speed = 8 + Math.random() * 6;
    this.length = 60 + Math.random() * 80;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.01;
  }
  update() {
    if (!this.active) return;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw() {
    if (!this.active) return;
    const endX = this.x - Math.cos(this.angle) * this.length;
    const endY = this.y - Math.sin(this.angle) * this.length;
    const grad = ctx.createLinearGradient(this.x, this.y, endX, endY);
    grad.addColorStop(0, `rgba(255,255,255,${this.life})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

class LaserBeam {
  constructor(startX, startY, targetX, targetY) {
    this.sx = startX;
    this.sy = startY;
    this.tx = targetX;
    this.ty = targetY;
    this.progress = 0;
    this.life = 1;
    this.phase = 'extend';
    this.holdTimer = 0;
  }
  update() {
    if (this.phase === 'extend') {
      this.progress += 0.08;
      if (this.progress >= 1) {
        this.progress = 1;
        this.phase = 'hold';
        spawnImpactParticles(this.tx, this.ty);
      }
    } else if (this.phase === 'hold') {
      this.holdTimer++;
      if (this.holdTimer > 12) this.phase = 'fade';
    } else if (this.phase === 'fade') {
      this.life -= 0.06;
    }
    return this.life > 0;
  }
  draw() {
    const cx = this.sx + (this.tx - this.sx) * this.progress;
    const cy = this.sy + (this.ty - this.sy) * this.progress;
    const alpha = this.life;

    lCtx.beginPath();
    lCtx.moveTo(this.sx, this.sy);
    lCtx.lineTo(cx, cy);
    lCtx.strokeStyle = `rgba(0, 255, 136, ${alpha * 0.3})`;
    lCtx.lineWidth = 14;
    lCtx.stroke();

    lCtx.beginPath();
    lCtx.moveTo(this.sx, this.sy);
    lCtx.lineTo(cx, cy);
    lCtx.strokeStyle = `rgba(0, 255, 200, ${alpha * 0.6})`;
    lCtx.lineWidth = 6;
    lCtx.stroke();

    lCtx.beginPath();
    lCtx.moveTo(this.sx, this.sy);
    lCtx.lineTo(cx, cy);
    lCtx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
    lCtx.lineWidth = 2;
    lCtx.stroke();

    if (this.phase === 'extend' || this.phase === 'hold') {
      const grad = lCtx.createRadialGradient(this.sx, this.sy, 0, this.sx, this.sy, 30);
      grad.addColorStop(0, `rgba(255,255,255,${alpha * 0.6})`);
      grad.addColorStop(0.3, `rgba(0,255,136,${alpha * 0.5})`);
      grad.addColorStop(1, 'rgba(0,255,136,0)');
      lCtx.beginPath();
      lCtx.arc(this.sx, this.sy, 30, 0, Math.PI * 2);
      lCtx.fillStyle = grad;
      lCtx.fill();
    }

    if (this.progress >= 1) {
      const impact = lCtx.createRadialGradient(this.tx, this.ty, 0, this.tx, this.ty, 40);
      impact.addColorStop(0, `rgba(255,255,255,${alpha * 0.8})`);
      impact.addColorStop(0.3, `rgba(0,255,136,${alpha * 0.5})`);
      impact.addColorStop(1, 'rgba(0,255,136,0)');
      lCtx.beginPath();
      lCtx.arc(this.tx, this.ty, 40, 0, Math.PI * 2);
      lCtx.fillStyle = impact;
      lCtx.fill();
    }
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.02 + Math.random() * 0.03;
    this.size = 1 + Math.random() * 3;
    this.isGreen = Math.random() > 0.3;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw() {
    const color = this.isGreen ? `rgba(0,255,136,${this.life})` : `rgba(255,255,255,${this.life})`;
    lCtx.beginPath();
    lCtx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    lCtx.fillStyle = color;
    lCtx.fill();
  }
}

class Planet {
  constructor(type, label, iconUrl) {
    this.type = type;
    this.label = label;
    this.iconUrl = iconUrl;
    this.el = document.createElement('div');
    this.el.className = `planet ${type}`;
    this.el.innerHTML = `
      <div class="planet-body">
        <div class="planet-ring"></div>
        <div class="planet-label">${label}</div>
        <img src="${iconUrl}" class="planet-icon" alt="${label}" onerror="this.src='https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/${type}.svg'; this.onerror=null;" />
      </div>
    `;
    const size = 30 + Math.random() * 40;
    this.el.style.width = `${size}px`;
    this.el.style.height = `${size}px`;
    document.getElementById('planetsContainer').appendChild(this.el);
    this.randomize();
  }
  randomize() {
    const panel = document.getElementById('enginePanel').getBoundingClientRect();
    const x = 50 + Math.random() * (panel.width - 150);
    const y = 50 + Math.random() * (panel.height - 150);
    this.el.style.left = `${x}px`;
    this.el.style.top = `${y}px`;
    this.el.style.transform = `scale(${0.8 + Math.random() * 0.4})`;
  }
}

const stars = [];
for (let i = 0; i < 180; i++) stars.push(new Star(0));
for (let i = 0; i < 60; i++) stars.push(new Star(1));
for (let i = 0; i < 25; i++) stars.push(new Star(2));
const shootingStars = Array.from({ length: 3 }, () => new ShootingStar());

const planets = [
  new Planet('btc', 'BITCOIN', 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/btc.svg'),
  new Planet('eth', 'ETHEREUM', 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/eth.svg'),
  new Planet('sol', 'SOLANA', 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/sol.svg'),
  new Planet('xrp', 'RIPPLE', 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/xrp.svg')
];

setInterval(() => {
  planets.forEach(p => {
    if (Math.random() < 0.3) p.randomize();
  });
}, 5000);

setInterval(() => {
  const s = shootingStars.find((star) => !star.active);
  if (s && Math.random() < 0.4) s.fire();
}, 2500);

function spawnImpactParticles(x, y) {
  for (let i = 0; i < 30; i++) particles.push(new Particle(x, y));
}

function impactPoint() {
  const panel = document.getElementById('enginePanel').getBoundingClientRect();
  const targetX = panel.right - 30 - Math.random() * 100;
  const targetY = panel.top + 80 + Math.random() * (panel.height - 130);
  return { targetX, targetY };
}

function moveTaco(xRatio, yRatio) {
  const panel = document.getElementById('enginePanel').getBoundingClientRect();
  const left = 20 + (panel.width - 100) * (xRatio || 0.1);
  const top = 60 + (panel.height - 100) * (yRatio || 0.5);
  tacoSprite.style.left = `${left}px`;
  tacoSprite.style.top = `${top}px`;
}

async function strikeTarget(pnlText) {
  const { targetX, targetY } = impactPoint();
  const panel = document.getElementById('enginePanel').getBoundingClientRect();
  
  // Fly closer to strike
  tacoSprite.classList.add('striking');
  tacoSprite.style.left = `${targetX - panel.left - 150}px`;
  tacoSprite.style.top = `${targetY - panel.top - 20}px`;
  tacoSprite.style.transform = 'rotate(15deg) scale(1.3)';

  setTimeout(() => {
    fireLaser(pnlText, targetX, targetY);
    setTimeout(() => {
      tacoSprite.classList.remove('striking');
      tacoSprite.style.transform = 'rotate(0deg) scale(1)';
      moveTaco(0.1, 0.4 + Math.random() * 0.2);
    }, 800);
  }, 400);
}

function fireLaser(pnlText, tX, tY) {
  const rect = tacoSprite.getBoundingClientRect();
  const startX = rect.right;
  const startY = rect.top + rect.height / 2;
  const targetX = tX || impactPoint().targetX;
  const targetY = tY || impactPoint().targetY;

  tacoSprite.classList.add('charging');
  setTimeout(() => {
    tacoSprite.classList.remove('charging');
    tacoSprite.classList.add('firing');
    activeLasers.push(new LaserBeam(startX, startY, targetX, targetY));
    galaxyContainer.classList.add('screen-shake');
    setTimeout(() => galaxyContainer.classList.remove('screen-shake'), 400);
    winFlash.classList.add('active');
    setTimeout(() => winFlash.classList.remove('active'), 600);
    winPnl.textContent = pnlText || '+$0.00';
    winBanner.classList.add('active');
    setTimeout(() => winBanner.classList.remove('active'), 1900);
    laserKills++;
    killCounterEl.textContent = `LASERS: ${laserKills}`;
    setTimeout(() => tacoSprite.classList.remove('firing'), 150);
  }, 100);
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  lCtx.clearRect(0, 0, W, H);
  time++;
  for (const star of stars) { star.update(time); star.draw(); }
  for (const s of shootingStars) { s.update(); s.draw(); }
  activeLasers = activeLasers.filter((laser) => laser.update());
  for (const laser of activeLasers) laser.draw();
  particles = particles.filter((particle) => particle.update());
  for (const particle of particles) particle.draw();
  requestAnimationFrame(animate);
}
animate();

function eventKey(ev) {
  return ev.seq || ev.id || `${ev.event_type}-${ev.engine || ''}-${ev.order_id || ''}-${ev.timestamp || ''}`;
}

function formatClock(ts) {
  const d = new Date(ts || Date.now());
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function addLog(ev) {
  const el = document.createElement('div');
  el.className = `log-entry ${ev.event_type || 'skip'}`;
  el.textContent = `${[ev.engine, ev.symbol].filter(Boolean).join(' • ')} • ${ev.reason || ev.event_type}`;
  const panelRect = logContainer.getBoundingClientRect();
  el.style.top = `${20 + Math.random() * Math.max(80, panelRect.height - 40)}px`;
  el.style.right = '-300px';
  el.style.setProperty('--dur', `${14 + Math.random() * 8}s`);
  logContainer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function renderFeed(ev) {
  const item = document.createElement('div');
  item.className = `feed-item ${ev.event_type || 'skip'}`;
  item.innerHTML = `
    <div class="feed-item-header">
      <span class="feed-type ${ev.event_type || 'skip'}">${(ev.event_type || 'event').replaceAll('_', ' ')}</span>
      <span class="feed-time">${formatClock(ev.live_timestamp || ev.timestamp)}</span>
    </div>
    <div class="feed-pair">${[ev.engine, ev.symbol].filter(Boolean).join(' • ') || 'LIVE EVENT'}</div>
    <div class="feed-msg">${ev.message || ev.reason || ev.event_type}</div>
  `;
  feedScroll.insertBefore(item, feedScroll.firstChild);
  while (feedScroll.children.length > 30) feedScroll.removeChild(feedScroll.lastChild);
}

function processEvent(ev) {
  if (!ev || !ev.event_type) return;
  const key = eventKey(ev);
  if (seenEvents.has(key)) return;
  seenEvents.add(key);
  addLog(ev);
  renderFeed(ev);

  if (ev.event_type === 'win' || ev.event_type === 'fill_verified' || ev.event_type === 'redeem') {
    const pnl = ev.pnl_text || ev.pnl_display || (ev.pnl_absolute !== undefined ? `${Number(ev.pnl_absolute) >= 0 ? '+' : ''}$${Math.abs(Number(ev.pnl_absolute)).toFixed(2)}` : '+$WIN');
    strikeTarget(pnl);
  } else if (ev.event_type === 'skip') {
    moveTaco(0.1 + Math.random() * 0.1, 0.2 + Math.random() * 0.6);
  } else if (ev.event_type === 'loss') {
    galaxyContainer.classList.add('screen-shake');
    setTimeout(() => galaxyContainer.classList.remove('screen-shake'), 250);
  }
}

function renderPositions(positions) {
  positionsList.innerHTML = '';
  const rows = Array.isArray(positions) ? positions : [];
  document.getElementById('positionsCount').textContent = `${rows.length} LOCKED`;
  for (const p of rows) {
    const pnl = Number(p.unrealized_pnl || 0);
    const row = document.createElement('div');
    row.className = 'position-row';
    row.innerHTML = `
      <span class="position-name">${p.symbol || p.market || 'UNKNOWN'}</span>
      <span class="position-price">$${Number(p.entry_price || 0).toFixed(3)}</span>
      <span class="position-pnl ${pnl >= 0 ? 'gain' : 'loss'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</span>
    `;
    positionsList.appendChild(row);
  }
}

async function updateStats() {
  try {
    const [report, summary, system, extended] = await Promise.all([
      fetch('/api/report').then((r) => r.json()).catch(() => ({})),
      fetch('/api/dashboard/summary').then((r) => r.json()).catch(() => ({})),
      fetch('/system').then((r) => r.json()).catch(() => ({})),
      fetch('/api/stats/extended').then((r) => r.json()).catch(() => ({})),
    ]);

    document.getElementById('portfolioValue').textContent = `$${Number(report.current_capital || 0).toFixed(2)}`;
    document.getElementById('winRate').textContent = `${extended.win_rate || 0}%`;
    document.getElementById('streak').textContent = report.streak || extended.streak || '0';
    document.getElementById('uptime').textContent = system.uptime || '--';
    if (system.cpu_temp_c !== undefined && system.cpu_temp_c !== null) {
      document.getElementById('tempBadge').innerHTML = `<svg viewBox="0 0 320 512" style="width:12px; height:12px; fill:var(--accent-gold);"><path d="M160 64c-26.5 0-48 21.5-48 48v153.1c-20.3 13.1-32 35.8-32 58.9 0 39.8 32.2 72 72 72s72-32.2 72-72c0-23.1-11.7-45.8-32-58.9V112c0-26.5-21.5-48-48-48z"/></svg> <span>${Number(system.cpu_temp_c).toFixed(1)}°C</span>`;
    }
    renderPositions(summary.positions || []);
    if (Array.isArray(summary.event_history) && feedScroll.children.length === 0) {
      summary.event_history.slice(-10).forEach(processEvent);
    }
  } catch (err) {
    document.getElementById('engineStatus').textContent = 'DEGRADED';
  }
}

function connectEvents() {
  const source = new EventSource('/api/events/stream');
  source.onopen = () => {
    document.getElementById('engineStatus').textContent = 'STREAMING';
  };
  source.onmessage = (event) => {
    try {
      processEvent(JSON.parse(event.data));
    } catch (err) {
      console.error('event parse error', err);
    }
  };
  source.onerror = () => {
    document.getElementById('engineStatus').textContent = 'RECONNECTING';
    source.close();
    setTimeout(connectEvents, 3000);
  };
}

tacoSprite.addEventListener('click', () => strikeTarget('+$🌮'));

updateStats();
setInterval(updateStats, 5000);
connectEvents();
</script>
